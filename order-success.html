<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Order Confirmed – Dork Mugs</title>
<link href="style.css" rel="stylesheet" type="text/css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css" />
<style>
  .success-wrap {
    max-width: 560px;
    margin: 80px auto 60px;
    text-align: center;
    padding: 0 20px;
  }
  .success-icon {
    font-size: 64px;
    color: #4caf50;
    margin-bottom: 20px;
  }
  .success-wrap h1 {
    font-size: 2rem;
    margin-bottom: 10px;
  }
  .success-wrap p {
    color: #666;
    margin-bottom: 8px;
    line-height: 1.6;
  }
  .success-wrap .btn-row {
    margin-top: 36px;
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .success-wrap a.btn {
    display: inline-block;
    padding: 12px 28px;
    border-radius: 6px;
    font-weight: 600;
    text-decoration: none;
    font-size: 0.95rem;
  }
  .btn-primary { background: #222; color: #fff; }
  .btn-outline { border: 2px solid #222; color: #222; }
</style>
</head>
<body>
<div class="container">

  <div class="success-wrap">
    <div class="success-icon"><i class="fas fa-check-circle"></i></div>
    <h1>Order Confirmed!</h1>
    <p>Thanks for your purchase. We've received your order and sent a confirmation to your email.</p>
    <p id="order-note">Your order is being prepared for production by Printify and will ship soon.</p>

    <div class="btn-row">
      <a href="account.html" class="btn btn-outline">View My Orders</a>
      <a href="index.html" class="btn btn-primary">Keep Shopping</a>
    </div>
  </div>

</div>

<script src="./include/auth.js"></script>
<script>
  // Clear the cart after a successful order
  try { localStorage.removeItem('dorkmugs_cart'); } catch (e) {}

  // Optionally fetch the session from the backend to show order details
  (function () {
    var params = new URLSearchParams(window.location.search);
    var sessionId = params.get('session_id');
    if (!sessionId) return;

    // Update note with session ID so customer can reference it
    var note = document.getElementById('order-note');
    if (note) {
      note.textContent = 'Your order is being prepared for production. Reference: ' + sessionId.slice(-8).toUpperCase();
    }
  })();
</script>
</body>
</html>
