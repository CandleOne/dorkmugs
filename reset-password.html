<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password – Dork Mugs</title>
<meta name="robots" content="noindex, follow" />
<link rel="icon" type="image/png" href="./favicon.png" />
<link rel="apple-touch-icon" href="./apple-touch-icon.png" />
<link href="style.css" rel="stylesheet" />
<style>
  .auth-page { min-height: 70vh; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
  .auth-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.10); padding: 40px 36px; width: 100%; max-width: 400px; }
  .auth-card h2 { margin: 0 0 24px; font-size: 1.5rem; }
  .auth-card .form-group { margin-bottom: 18px; }
  .auth-card label { display: block; font-weight: 600; margin-bottom: 6px; font-size: .9rem; }
  .auth-card input { width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 1rem; box-sizing: border-box; }
  .auth-card input:focus { outline: none; border-color: #222; }
  .auth-card .btn-submit { width: 100%; padding: 12px; background: #222; color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .auth-card .btn-submit:disabled { background: #999; cursor: not-allowed; }
  .auth-success { background: #f0fff4; border: 1px solid #c3e6cb; color: #155724; border-radius: 6px; padding: 12px 14px; margin-bottom: 16px; font-size: .9rem; display: none; }
  .auth-error { background: #fff0f0; border: 1px solid #f5c6cb; color: #b00020; border-radius: 6px; padding: 10px 14px; margin-bottom: 16px; font-size: .9rem; display: none; }
  .pw-hint { font-size: .8rem; color: #888; margin-top: 4px; }
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <div class="header-brand">
      <a href="index.html"><img src="./Assets/Branding/dorkmugsnobg.png" alt="Dork Mugs" class="header-logo" /></a>
    </div>
  </header>

  <div class="auth-page">
    <div class="auth-card">
      <h2>Set New Password</h2>
      <div id="auth-success" class="auth-success"></div>
      <div id="auth-error" class="auth-error"></div>
      <form id="reset-form" novalidate>
        <div class="form-group">
          <label for="password">New Password</label>
          <input type="password" id="password" required autocomplete="new-password" placeholder="••••••••" />
          <p class="pw-hint">Min 8 chars, 1 uppercase letter, 1 number.</p>
        </div>
        <div class="form-group">
          <label for="confirm">Confirm Password</label>
          <input type="password" id="confirm" required autocomplete="new-password" placeholder="••••••••" />
        </div>
        <button type="submit" class="btn-submit" id="btn-submit">Update Password</button>
      </form>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-copy">&copy; 2026 Dork Mugs. All rights reserved.</div>
  </footer>
</div>

<script>
  var API = (function () {
    if (window.__DORKMUGS_API_BASE__) return String(window.__DORKMUGS_API_BASE__).replace(/\/+$/, '');
    if (window.location.protocol === 'file:') return 'http://localhost:5000/api';
    if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
      return window.location.protocol + '//' + window.location.hostname + ':5000/api';
    }
    return window.location.origin.replace(/\/+$/, '') + '/api';
  })();

  var token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    document.getElementById('auth-error').textContent = 'Invalid or missing reset token.';
    document.getElementById('auth-error').style.display = 'block';
    document.getElementById('reset-form').style.display = 'none';
  }

  document.getElementById('reset-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var errEl = document.getElementById('auth-error');
    var sucEl = document.getElementById('auth-success');
    var btn = document.getElementById('btn-submit');
    errEl.style.display = 'none';

    var password = document.getElementById('password').value;
    var confirm = document.getElementById('confirm').value;

    if (password.length < 8 || !/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
      errEl.textContent = 'Password must be at least 8 chars, 1 uppercase, 1 number.';
      errEl.style.display = 'block'; return;
    }
    if (password !== confirm) {
      errEl.textContent = 'Passwords do not match.';
      errEl.style.display = 'block'; return;
    }

    btn.disabled = true; btn.textContent = 'Updating…';

    fetch(API + '/auth/reset-password', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, password: password }),
    })
    .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
    .then(function (res) {
      if (!res.ok) throw new Error(res.data.error || 'Failed.');
      sucEl.textContent = res.data.message + ' Redirecting to login…';
      sucEl.style.display = 'block';
      document.getElementById('reset-form').style.display = 'none';
      setTimeout(function () { window.location.href = 'login.html'; }, 2500);
    })
    .catch(function (err) {
      errEl.textContent = err.message || 'Something went wrong.';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Update Password';
    });
  });
</script>
</body>
</html>
