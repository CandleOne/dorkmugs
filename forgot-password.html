<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forgot Password – Dork Mugs</title>
<link href="style.css" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css" />
<style>
  .auth-page { min-height: 70vh; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
  .auth-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.10); padding: 40px 36px; width: 100%; max-width: 400px; }
  .auth-card h2 { margin: 0 0 8px; font-size: 1.5rem; }
  .auth-card p.subtitle { color: #666; margin: 0 0 24px; font-size: .92rem; }
  .auth-card .form-group { margin-bottom: 18px; }
  .auth-card label { display: block; font-weight: 600; margin-bottom: 6px; font-size: .9rem; }
  .auth-card input { width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 1rem; box-sizing: border-box; transition: border-color .2s; }
  .auth-card input:focus { outline: none; border-color: #222; }
  .auth-card .btn-submit { width: 100%; padding: 12px; background: #222; color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 8px; }
  .auth-card .btn-submit:disabled { background: #999; cursor: not-allowed; }
  .auth-success { background: #f0fff4; border: 1px solid #c3e6cb; color: #155724; border-radius: 6px; padding: 12px 14px; margin-bottom: 16px; font-size: .9rem; display: none; }
  .auth-error { background: #fff0f0; border: 1px solid #f5c6cb; color: #b00020; border-radius: 6px; padding: 10px 14px; margin-bottom: 16px; font-size: .9rem; display: none; }
  .auth-footer { text-align: center; margin-top: 20px; font-size: .9rem; color: #666; }
  .auth-footer a { color: #222; font-weight: 600; }
</style>
</head>
<body>
<div class="container">
  <div class="announcement-bar">Free shipping on orders over $40</div>
  <header class="header">
    <div class="header-brand">
      <a href="index.html"><img src="./Assets/Branding/dorkmugsnobg.png" alt="Dork Mugs" class="header-logo" /></a>
    </div>
  </header>

  <div class="auth-page">
    <div class="auth-card">
      <h2>Forgot Password</h2>
      <p class="subtitle">Enter your email and we&rsquo;ll send a reset link.</p>
      <div id="auth-success" class="auth-success"></div>
      <div id="auth-error" class="auth-error"></div>
      <form id="forgot-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com" />
        </div>
        <button type="submit" class="btn-submit" id="btn-submit">Send Reset Link</button>
      </form>
      <div class="auth-footer"><a href="login.html">&larr; Back to Log In</a></div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-copy">&copy; 2026 Dork Mugs. All rights reserved.</div>
  </footer>
</div>

<script src="./include/auth.js"></script>
<script>
  var API = (function () {
    if (window.__DORKMUGS_API_BASE__) return String(window.__DORKMUGS_API_BASE__).replace(/\/+$/, '');
    if (window.location.protocol === 'file:') return 'http://localhost:5000/api';
    if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
      return window.location.protocol + '//' + window.location.hostname + ':5000/api';
    }
    return window.location.origin.replace(/\/+$/, '') + '/api';
  })();

  document.getElementById('forgot-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var errEl = document.getElementById('auth-error');
    var sucEl = document.getElementById('auth-success');
    var btn = document.getElementById('btn-submit');
    errEl.style.display = 'none'; sucEl.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Sending…';

    fetch(API + '/auth/forgot-password', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: document.getElementById('email').value.trim() }),
    })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      sucEl.textContent = data.message || 'Check your email for a reset link.';
      sucEl.style.display = 'block';
      btn.textContent = 'Sent!';
    })
    .catch(function () {
      errEl.textContent = 'Something went wrong. Please try again.';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Send Reset Link';
    });
  });
</script>
</body>
</html>
